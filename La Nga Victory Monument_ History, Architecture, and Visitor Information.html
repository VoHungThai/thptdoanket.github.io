<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phiếu Trả Lời Trắc Nghiệm ĐGNL HCM</title>
<style>
  @page { size: A4; margin: 0; }
  body { font-family: 'Times New Roman', Times, serif; background: #e9ecef; margin: 0; display: flex; justify-content: center; padding: 20px 0; }
  .a4-sheet { width: 210mm; min-height: 297mm; background: white; padding: 25mm 20mm; box-sizing: border-box; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
  @media print { 
    body { background: white; padding: 0; } 
    .a4-sheet { box-shadow: none; padding: 20mm; margin: 0; } 
  }
  h1 { text-align: center; font-size: 22px; text-transform: uppercase; margin-bottom: 40px; }
  .student-info { display: flex; flex-wrap: wrap; justify-content: space-between; margin-bottom: 40px; font-size: 16px; line-height: 2; }
  .student-info div { width: 45%; border-bottom: 1px dotted #000; }
  .grid { display: flex; justify-content: space-between; }
  .column { display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .q-num { width: 28px; text-align: right; font-weight: bold; font-size: 15px; }
  .options { display: flex; gap: 8px; }
  .circle { width: 22px; height: 22px; border: 1.5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #333; }
</style>
</head>
<body>
  <div class="a4-sheet">
    <h1>Phiếu Trả Lời Trắc Nghiệm - 120 Câu</h1>
    <div class="student-info">
      <div>Họ và tên: </div>
      <div>Số báo danh: </div>
      <div>Ngày sinh: </div>
      <div>Mã đề thi: </div>
    </div>
    <div class="grid" id="answer-grid"></div>
  </div>
  <script>
    const grid = document.getElementById('answer-grid');
    let htmlContent = '';
    /* Vòng lặp chia làm 4 cột, mỗi cột 30 câu */
    for (let c = 0; c < 4; c++) {
      htmlContent += '<div class="column">';
      for (let r = 1; r <= 30; r++) {
        let questionNumber = c * 30 + r;
        htmlContent += `
          <div class="row">
            <div class="q-num">${questionNumber}</div>
            <div class="options">
              <div class="circle">A</div><div class="circle">B</div><div class="circle">C</div><div class="circle">D</div>
            </div>
          </div>`;
      }
      htmlContent += '</div>';
    }
    grid.innerHTML = htmlContent;
  </script>
</body>
</html>
